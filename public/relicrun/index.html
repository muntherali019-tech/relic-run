<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Relic Run — hunt real archaeological treasures</title>
<meta name="description" content="A retro Pac-Man-style chase through five ancient sites. Collect historically accurate artifacts while the guards sweep each level behind you." />
<style>
  :root { --ink: #f5e9d0; --dim: #a89878; }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: #060407; color: var(--ink);
    font-family: "Courier New", ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 10px 8px 24px;
  }
  h1 { font-size: 26px; letter-spacing: 6px; margin: 6px 0 2px; color: #ffd23e; text-shadow: 0 0 14px #ffb800aa; }
  .sub { color: var(--dim); font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
  #hud {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    font-weight: 700; font-size: 14px; margin-bottom: 8px; letter-spacing: 1px;
  }
  #hud span { white-space: nowrap; }
  #hud-lives { color: #ff5a5a; }
  #hud-relics { color: #ffd23e; }
  #stage { position: relative; }
  canvas { display: block; border: 2px solid #2a2033; border-radius: 8px; background: #000; touch-action: none; }
  #overlay {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(4,2,8,.88); border-radius: 8px; text-align: center; padding: 18px; cursor: pointer;
  }
  #overlay.show { display: flex; }
  #overlay-title { font-size: 22px; letter-spacing: 4px; color: #ffd23e; margin-bottom: 10px; text-shadow: 0 0 12px #ffb800aa; }
  #overlay-body { font-size: 14px; line-height: 1.55; max-width: 480px; }
  #overlay-body .era { color: var(--dim); letter-spacing: 2px; text-transform: uppercase; font-size: 11px; }
  #overlay-hint { margin-top: 14px; font-size: 12px; color: var(--dim); animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  #toast {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(20px);
    background: #17102a; border: 1px solid #ffd23e66; color: var(--ink);
    padding: 10px 16px; border-radius: 10px; max-width: min(560px, 92vw);
    font-size: 13px; line-height: 1.45; text-align: center;
    opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast b { color: #ffd23e; }
  .back { margin-top: 14px; font-size: 12px; }
  .back a { color: var(--dim); }
  @media (prefers-reduced-motion: reduce) { #overlay-hint { animation: none; } }
</style>
</head>
<body>
  <h1>◆ RELIC RUN ◆</h1>
  <div class="sub">An archaeological chase in five levels</div>
  <div id="hud">
    <span id="hud-level">L1</span>
    <span id="hud-score">00000</span>
    <span id="hud-lives">❤❤❤</span>
    <span id="hud-relics">🏺 0/3</span>
  </div>
  <div id="stage">
    <canvas id="game" width="672" height="416" aria-label="Relic Run game board"></canvas>
    <div id="overlay" class="show">
      <div id="overlay-title"></div>
      <div id="overlay-body"></div>
      <div id="overlay-hint"></div>
    </div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <p class="back"><a href="/">← back to Education Academy</a></p>
  <script type="module" src="./game.js"></script>
</body>
</html>
