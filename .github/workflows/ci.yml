name: Reelmint CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reelmint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: reelmint/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all JS
        run: |
          for f in server/*.js public/app.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Run tests
        run: npm test

      - name: Smoke-test server (demo mode)
        run: |
          PORT=3000 node server/index.js &
          SRV=$!
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo "health OK"; break
            fi
            sleep 0.5
          done
          curl -fsS http://localhost:3000/api/health
          curl -fsS -X POST http://localhost:3000/api/auth/signup \
            -H 'content-type: application/json' \
            -d '{"email":"ci@example.com","password":"secret123"}' > /dev/null && echo "signup OK"
          curl -fsS -X POST http://localhost:3000/api/script \
            -H 'content-type: application/json' \
            -d '{"topic":"morning focus","durationSec":30}' > /dev/null && echo "script OK"
          curl -fsS -X POST http://localhost:3000/api/hooks \
            -H 'content-type: application/json' \
            -d '{"topic":"cold plunge","count":4}' > /dev/null && echo "hooks OK"
          curl -fsS -X POST http://localhost:3000/api/series \
            -H 'content-type: application/json' \
            -d '{"topic":"sourdough","days":7}' > /dev/null && echo "series OK"
          kill $SRV 2>/dev/null || true
